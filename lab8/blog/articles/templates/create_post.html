<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>новая статья</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/create_post.css">
</head>
<body>
    <div class="header">
        <img src="{{ STATIC_URL }}img/dpb-logo.jpg" alt="лого">
        <a href="/" class="back-link">все статьи</a>
        <div class="clear"></div>
    </div>
    
    <div class="content">
        <h1>написать статью</h1>
        
        <form method="POST" class="post-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">название:</label>
                <input type="text" name="title" id="title" 
                       value="{{ title }}" placeholder="придумай название">
            </div>
            
            <div class="form-group">
                <label for="text">текст:</label>
                <textarea name="text" id="text" rows="10" 
                          placeholder="напиши что-нибудь">{{ text }}</textarea>
            </div>
            
            <div class="form-group">
                <button type="submit" class="submit-btn">сохранить</button>
            </div>
            
            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}
        </form>
    </div>
</body>
</html>
